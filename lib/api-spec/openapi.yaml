openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: properties
    description: Property listings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List properties
      description: Returns all properties, optionally filtered
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [buy, rent]
        - name: location
          in: query
          required: false
          schema:
            type: string
        - name: minBudget
          in: query
          required: false
          schema:
            type: number
        - name: maxBudget
          in: query
          required: false
          schema:
            type: number
        - name: propertyType
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"

    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a property
      description: Admin only — adds a new property listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "400":
          description: Bad request

  /properties/{id}:
    get:
      operationId: getProperty
      tags: [properties]
      summary: Get a property by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Not found

    patch:
      operationId: updateProperty
      tags: [properties]
      summary: Update a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Not found

    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Property:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        price:
          type: string
        priceValue:
          type: number
        location:
          type: string
        type:
          type: string
          enum: [buy, rent]
        propertyType:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        beds:
          type: ["integer", "null"]
        baths:
          type: ["integer", "null"]
        area:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - title
        - price
        - priceValue
        - location
        - type
        - propertyType
        - createdAt

    CreatePropertyBody:
      type: object
      properties:
        title:
          type: string
        price:
          type: string
        priceValue:
          type: number
        location:
          type: string
        type:
          type: string
          enum: [buy, rent]
        propertyType:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        beds:
          type: ["integer", "null"]
        baths:
          type: ["integer", "null"]
        area:
          type: ["string", "null"]
      required:
        - title
        - price
        - priceValue
        - location
        - type
        - propertyType

    UpdatePropertyBody:
      type: object
      properties:
        title:
          type: string
        price:
          type: string
        priceValue:
          type: number
        location:
          type: string
        type:
          type: string
          enum: [buy, rent]
        propertyType:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        beds:
          type: ["integer", "null"]
        baths:
          type: ["integer", "null"]
        area:
          type: ["string", "null"]
