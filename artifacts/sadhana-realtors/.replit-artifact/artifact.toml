kind = "web"
previewPath = "/"
title = "Sadhana Realtors"
version = "1.0.0"
id = "artifacts/sadhana-realtors"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20492

[services.development]
run = "pnpm --filter @workspace/sadhana-realtors run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sadhana-realtors", "run", "build" ]
publicDir = "artifacts/sadhana-realtors/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20492"
BASE_PATH = "/"
